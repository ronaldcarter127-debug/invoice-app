<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JobFlow Pro">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>JobFlow Pro</title>
<link rel="manifest" href="manifest.json?v=20260420-modern">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Allura&family=Alex+Brush&display=swap" rel="stylesheet">
<link rel="stylesheet" href="workspace/invoice-app/src/css/styles.css?v=20260420-modern">
</head>
<body>
<div class="preview" id="previewArea"></div>

<!-- ── SETTINGS VIEW ── -->
<div id="settingsView" style="display:none;">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="color:#f59e0b;font-size:16px;">[Settings View]</span>
      <button class="dash-back" onclick="showDashboard()">&#8592; Back to Dashboard</button>
    </div>
    <h2 style="margin:0 0 14px;">Business Info</h2>
    <div class="section">
      <input id="businessName" placeholder="Business Name" onblur="saveBusinessInfo()">
      <input id="businessAddress" placeholder="Address" onblur="saveBusinessInfo()">
      <input id="businessPhone" placeholder="Phone" onblur="saveBusinessInfo()">
      <input id="businessEmail" placeholder="Email" onblur="saveBusinessInfo()">
      <input id="businessStripeUrl" placeholder="Stripe Checkout Link (optional)" onblur="saveBusinessInfo()">
      <input id="businessLicense" placeholder="License Number (optional)" onblur="saveBusinessInfo()">
      <input id="businessSignatureName" placeholder="Signature Name" onblur="saveBusinessInfo()">
    </div>
    <div class="section">
      <h3>Logo</h3>
      <input type="file" id="logoUpload" accept="image/*" onchange="handleLogoUpload(event)">
      <div id="logoPreview" style="border:2px dashed #374151;padding:10px;text-align:center;border-radius:6px;min-height:60px;display:flex;align-items:center;justify-content:center;margin-top:8px;">
        <span style="color:#6b7280;font-size:12px;">No logo uploaded</span>
      </div>
      <label style="display:block;margin-top:10px;color:#00ee58;font-size:13px;">Logo Size:</label>
      <input type="range" id="logoSize" min="30" max="150" value="50" oninput="updateLogoSize()" style="width:100%;">
      <span id="logoSizeValue" style="font-size:11px;color:#6b7280;">50px</span>
      <label style="display:block;margin-top:10px;color:#00ee58;font-size:13px;">Logo Position:</label>
      <select id="logoCrop" onchange="updateLogoCrop()">
        <option value="center">Center</option>
        <option value="top">Top</option>
        <option value="bottom">Bottom</option>
        <option value="left">Left</option>
        <option value="right">Right</option>
        <option value="top left">Top Left</option>
        <option value="top right">Top Right</option>
        <option value="bottom left">Bottom Left</option>
        <option value="bottom right">Bottom Right</option>
      </select>
    </div>
    <button id="saveBusinessInfoBtn" type="button" class="primary">Save Business Info</button>
    <div id="settingsSaveMsg" style="margin-top:8px;font-size:13px;color:#94a3b8;"></div>
  </div>
</div>

<!-- ── CUSTOMER LIST VIEW ── -->
<div id="customerListView" style="display:none;">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="color:#60a5fa;font-size:16px;">[Customer List View]</span>
      <button class="dash-back" onclick="showDashboard()">&#8592; Back to Dashboard</button>
    </div>
    <h2 style="margin:0 0 14px;">Customers</h2>
    <div id="customerListOutput"></div>
  </div>
</div>

<!-- ── ACCOUNT VIEW ── -->
<div id="accountView" style="display:none;">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="color:#10b981;font-size:16px;">[Account View]</span>
      <button class="dash-back" onclick="showDashboard()">&#8592; Back to Dashboard</button>
    </div>
    <h2 style="margin:0 0 14px;">Account Details</h2>
    <div id="accountDetailsOutput"></div>
    <button type="button" class="danger" style="margin-top:12px;" onclick="logoutUser()">Log Out</button>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard" style="display:block;">
  <div class="card">
    <div class="dash-welcome">Welcome to JobFlow Pro</div>
    <div class="dash-main-grid" style="display: flex; gap: 32px;">
      <!-- Left Column: Quotes -->
      <div style="flex:1; min-width:260px;">
        <button id="dashCreateQuoteBtn" class="dash-entry-btn quote" style="width:100%;margin-bottom:16px;">
          <span class="dash-entry-title">New Quote</span>
          <span class="dash-entry-sub">Send a quote for approval</span>
        </button>
        <div class="dash-panel">
          <div class="dash-panel-title-row">
            <h3>Quote History</h3>
          </div>
          <div id="dashQuotesHistory"></div>
        </div>
      </div>
      <!-- Right Column: Invoices -->
      <div style="flex:1; min-width:260px;">
        <button id="dashCreateInvoiceBtn" class="dash-entry-btn invoice" style="width:100%;margin-bottom:16px;">
          <span class="dash-entry-title">New Invoice</span>
          <span class="dash-entry-sub">Create and send an invoice</span>
        </button>
        <div class="dash-panel">
          <div class="dash-panel-title-row">
            <h3>Invoice History</h3>
          </div>
          <div id="dashInvoicesPipeline"></div>
        </div>
      </div>
    </div>
    <div class="dash-utility-row">
      <button id="dashCustomersBtn" class="dash-card">
        <span class="dash-label">Customers</span>
        <span class="dash-sub">Manage saved customers</span>
      </button>
      <button id="dashSettingsBtn" class="dash-card">
        <span class="dash-label">Business Info</span>
        <span class="dash-sub">Edit your business details</span>
      </button>
      <button id="dashAccountBtn" class="dash-card">
        <span class="dash-label">Account</span>
        <span class="dash-sub">View account & plan</span>
      </button>
    </div>
    <div style="margin-top:18px;text-align:right;font-size:13px;color:#9ca3af;">
      <span id="dashAccountSync">Last synced: never</span>
      <span id="dashPlanBadge" style="margin-left:18px;"></span>
      <span id="dashPlanMsg" style="margin-left:8px;"></span>
      <button id="upgradeBtn" class="upgrade-btn" style="display:none;margin-left:18px;">Upgrade</button>
    </div>
  </div>
</div>



<!-- ── APP CONTAINER (FORM) ── -->
<div id="appContainer" style="display:none;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <span style="font-weight:bold;font-size:16px;">Form</span>
    <button class="dash-back" onclick="showDashboard()">&#8592; Back to Dashboard</button>
  </div>
  <div class="card">
    <div class="form-stepper">
      <div class="form-step-dot" data-step="2"></div>
      <div class="form-step-line"></div>
      <div class="form-step-dot" data-step="3"></div>
      <div class="form-step-line"></div>
      <div class="form-step-dot" data-step="4"></div>
      <div class="form-step-line"></div>
      <div class="form-step-dot" data-step="5"></div>
    </div>
    <div class="form-step" data-step="2">
      <h2>Client Info</h2>
      <input id="customer" placeholder="Client Name">
      <input id="customerEmail" placeholder="Client Email">
      <button class="primary" onclick="nextFormStep(2);return false;">Next</button>
    </div>
    <div class="form-step" data-step="3" style="display:none;">
      <h2>Job Breakdown</h2>
      <input id="laborAmount" type="number" placeholder="Labor Amount">
      <input id="materialsAmount" type="number" placeholder="Materials Amount">
      <button onclick="prevFormStep(3);return false;">Back</button>
      <button class="primary" onclick="nextFormStep(3);return false;">Next</button>
    </div>
    <div class="form-step" data-step="4" style="display:none;">
      <h2>Review &amp; Send</h2>
      <div id="reviewHeading"></div>
      <div id="reviewClient"></div>
      <div id="reviewEmail"></div>
      <div id="reviewLabor"></div>
      <div id="reviewMaterials"></div>
      <div id="reviewTotal"></div>
      <div id="reviewDueRow"></div>
      <button onclick="prevFormStep(4);return false;">Back</button>
      <button id="sendAndGetPaidBtn" class="primary" onclick="nextFormStep(4);return false;">Create &amp; Send</button>
    </div>
    <div class="form-step" data-step="5" style="display:none;">
      <h2 id="doneTitle"></h2>
      <div id="doneMessage"></div>
      <div id="paymentLinkContainer"></div>
      <button id="openPaymentLinkBtn" onclick="openPaymentLink()" style="display:inline-block;">Send Quote Email</button>
      <button id="sendAnotherBtn">Send Another</button>
      <button class="danger" style="margin-top:16px;font-size:14px;padding:4px 12px;" onclick="abandonFormAndReturnToDashboard()">Abandon & Back to Dashboard</button>
    </div>
  </div>
</div>

<!-- ── HISTORY VIEW (INVISIBLE PLACEHOLDER) ── -->
<div id="historyView" style="display:none;">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="color:#fbbf24;font-size:16px;">[History View Placeholder]</span>
      <button class="dash-back" onclick="showDashboard()">&#8592; Back to Dashboard</button>
    </div>
    <div id="historyOutput"></div>
  </div>
</div>

<script src="calculator.js?v=20260419r"></script>
<script src="dom.js?v=20260419r"></script>
<script src="storage.js?v=20260419r"></script>
<script src="ui.js?v=20260419r"></script>
<script src="business.js?v=20260419r"></script>
<script src="documents.js?v=20260419r"></script>
<script src="app.js?v=20260419r"></script>

</body>
</html>
